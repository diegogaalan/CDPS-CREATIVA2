apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings-v1
  namespace: cdps-3
  labels:
    app: ratings
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ratings
      version: v1
  template:
    metadata:
      labels:
        app: ratings
        version: v1
    spec:
      containers:
      - name: ratings
        image: cdps-ratings:g3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
        env:
        - name: APP_VERSION
          value: "v1"