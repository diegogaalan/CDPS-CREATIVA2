apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpage-v1
  namespace: cdps-3
  labels:
    app: productpage
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productpage
      version: v1
  template:
    metadata:
      labels:
        app: productpage
        version: v1
    spec:
      containers:
      - name: productpage
        image: cdps-productpage:g3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
        env:
        - name: TEAM_ID
          value: "3"